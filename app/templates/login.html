{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card bg-dark text-light border-secondary shadow">
            <div class="card-body p-4">
                <h3 class="mb-3">Login ProofForge</h3>
                <p class="text-secondary">
                    Masuk untuk mendaftarkan dokumen ke blockchain sederhana.
                </p>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100">Login</button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{{ url_for('auth.register') }}">Belum punya akun? Register</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
